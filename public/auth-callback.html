<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PANSA 로그인 처리 중...</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #F5F6FA; color: #222; }
  .box { text-align: center; padding: 24px; }
  a.button { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #2F6BF6; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
  <div class="box">
    <p>로그인 처리 중이에요. 잠시만 기다려주세요...</p>
    <a id="fallback" class="button" href="#" style="display:none;">PANSA 앱으로 돌아가기</a>
  </div>
  <script>
    var target = 'pansa://auth-callback' + window.location.search;
    var fallback = document.getElementById('fallback');
    fallback.href = target;
    window.location.replace(target);
    setTimeout(function () {
      fallback.style.display = 'inline-block';
    }, 1500);
  </script>
</body>
</html>
